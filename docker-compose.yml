services:
  db:
    image: postgres:16
    container_name: wcp_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: wcp_backend
    env_file: .env
    environment:
      - SCRAPER_URL=http://scraper:5001
    ports: ["3000:3000"]
    depends_on:
      db: { condition: service_healthy }
    command: npm run dev
    volumes:
      - ./backend:/app
      - /app/node_modules   # préserve les node_modules du build

  frontend:
    build: ./frontend
    container_name: wcp_frontend
    ports: ["5173:5173"]
    depends_on: [backend]
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:3000}
    volumes:
      - ./frontend:/app
      - /app/node_modules   # préserve les node_modules du build

  # Frontend PRODUCTION — docker compose --profile prod up frontend-prod
  frontend-prod:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
    container_name: wcp_frontend_prod
    ports: ["80:80"]
    depends_on: [backend]
    profiles: ["prod"]

  # Scraper — tourne en permanence comme serveur HTTP (POST /scrape pour déclencher)
  scraper:
    build: ./scraper
    container_name: wcp_scraper
    env_file: .env
    depends_on:
      db: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/status')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  # Modèle Poisson — lancé manuellement : docker compose run --rm ai-service
  ai-service:
    build: ./ai-service
    container_name: wcp_ai
    env_file: .env
    depends_on:
      db: { condition: service_healthy }
    profiles: ["tools"]

volumes:
  pgdata: