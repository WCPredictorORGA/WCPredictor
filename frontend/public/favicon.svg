<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7e14ff"/>
      <stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
    <clipPath id="ball">
      <circle cx="32" cy="32" r="21"/>
    </clipPath>
  </defs>

  <!-- Fond arrondi violet (cohérent avec le thème de l'app) -->
  <rect x="0" y="0" width="64" height="64" rx="16" fill="url(#bg)"/>

  <!-- Ballon -->
  <circle cx="32" cy="32" r="21" fill="#ffffff"/>

  <g clip-path="url(#ball)" stroke="#1a1d26" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <!-- Coutures partant du pentagone central vers le bord -->
    <line x1="32" y1="25" x2="32" y2="11"/>
    <line x1="38.66" y1="29.84" x2="51.97" y2="25.51"/>
    <line x1="36.11" y1="37.66" x2="44.34" y2="48.99"/>
    <line x1="27.89" y1="37.66" x2="19.66" y2="48.99"/>
    <line x1="25.34" y1="29.84" x2="12.03" y2="25.51"/>

    <!-- Pentagones noirs du bord (rognés par le cercle) -->
    <polygon points="32,58 26.29,53.85 28.47,47.15 35.53,47.15 37.71,53.85" fill="#1a1d26"/>
    <polygon points="7.27,40.03 9.45,33.33 16.51,33.33 18.69,40.03 12.98,44.18" fill="#1a1d26"/>
    <polygon points="16.71,10.97 23.77,10.97 25.95,17.67 20.24,21.82 14.53,17.67" fill="#1a1d26"/>
    <polygon points="47.29,10.97 49.47,17.67 43.76,21.82 38.05,17.67 40.23,10.97" fill="#1a1d26"/>
    <polygon points="56.73,40.03 51.02,44.18 45.31,40.03 47.49,33.33 54.55,33.33" fill="#1a1d26"/>
  </g>

  <!-- Pentagone central -->
  <polygon points="32,25 38.66,29.84 36.11,37.66 27.89,37.66 25.34,29.84" fill="#1a1d26"/>

  <!-- Liseré du ballon -->
  <circle cx="32" cy="32" r="21" fill="none" stroke="#1a1d26" stroke-width="1.4" opacity="0.35"/>
</svg>
